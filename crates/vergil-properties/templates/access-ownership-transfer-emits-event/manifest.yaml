id: access-ownership-transfer-emits-event
description: transferOwnership(newOwner) updates the owner() to newOwner and emits OwnershipTransferred(prev, new) — the storage write and the event must be consistent
cost_class: cheap
applies_to:
  interfaces: [Ownable]
requires:
  storage_slots:
    - name: _owner
      type: address
  modifiers: [onlyOwner]
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: OpenZeppelin Ownable
  license: Apache-2.0
