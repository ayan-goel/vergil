id: access-missing-modifier-state-change
name: Missing access-control modifier on state-changing function
category: access
severity: critical

decidability:
  smt_status: decidable
  expected_solver: z3
  expected_theory: mixed

applies_to:
  interfaces: [any]
  primitives: [any]
  patterns:
    state_change_present: true
    no_auth_check: true

requires:
  storage_slots: []
  modifiers: {}
  external_call_handling: tracked

negation_property: |
  Every state-changing call must be made by an authorized principal.

  Formally:
    ∀ tx, ∀ f ∈ stateChanging:
      reachable(f) ⇒ msg.sender ∈ authorized(f)

  Phase-1 encoding: a separate, non-owner attacker contract attempts the
  mutation. If the attempt does not revert, the protected state must remain
  unchanged. The clean fixture (modifier present) satisfies this trivially
  by reverting; the vulnerable fixture (modifier absent) breaks the assertion.

encoding:
  halmos: halmos.sol.tmpl
  smtchecker: smtchecker.sol.tmpl

fixtures:
  vulnerable: fixtures/vulnerable.sol
  clean: fixtures/clean.sol

provenance:
  tier: original
  source: vergil-original
  license: Apache-2.0
  references:
    - "SWC-105"
    - "SWC-100"
    - "OWASP SC01:2026"
    - "Slither suicidal / arbitrary-send"
  real_world:
    - name: "Parity Multisig"
      year: 2017
      loss_usd_approx: 280000000
      chain: ethereum
      url: "https://www.parity.io/blog/security-alert-2/"

mitigation: |
  Add an explicit access modifier (`onlyOwner` / `onlyRole(...)`) to every
  state-changing privileged function. Prefer OpenZeppelin's `Ownable` or
  `AccessControl` over hand-rolled checks. If a function intentionally
  permits arbitrary callers (a public utility), document that intent in
  NatSpec so the catalog can exclude it via an `@custom:vergil-allow`
  annotation in a later phase.

engineering_notes: |
  This is the canonical Phase-1 demo template — chosen because the negation
  property reduces to a UF authorization predicate (Z3-fast) and the
  vulnerable/clean diff is a single modifier keyword.

  The Halmos encoding uses a HELPER caller contract (`Attacker_*`) rather
  than `vm.prank` because the bare Vergil scaffold provides no `vm.*`
  cheatcodes (per the Phase 4 A9.1 harness-aware-synthesis post-mortem).

  Both fixtures expose `setProtected(uint256)` and `protectedValue()` so
  the same rendered encoding works against both. The fixture `Target`
  contract assigns ownership to `msg.sender` in its constructor, so the
  check contract — which deploys `target = new Target()` — IS the owner.
  The helper `Attacker` contract is at a different address, so calls
  routed through it have `msg.sender != owner` and exercise the
  authorization predicate.
