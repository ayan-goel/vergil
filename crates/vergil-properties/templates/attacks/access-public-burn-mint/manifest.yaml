id: access-public-burn-mint
name: Unprotected mint / burn
category: access
severity: critical

decidability:
  smt_status: decidable
  expected_solver: z3
  expected_theory: uf

applies_to:
  interfaces: [ERC20, ERC721, ERC1155]
  primitives: [token]
  patterns:
    state_change_present: true
    no_auth_check: true

requires:
  storage_slots: []
  modifiers: {}
  external_call_handling: tracked

negation_property: |
  Only an authorized minter role may invoke `mint`; only an authorized
  burner role (or self) may invoke `burn`.

  Formally:
    ∀ mint(to, amount): msg.sender ∈ minterRole
    ∀ burn(from, amount): msg.sender ∈ burnerRole ∨ msg.sender == from

  Phase-1 encoding (Halmos): a separate Attacker contract attempts to mint
  to itself. If the attempt does not revert, the contract's totalSupply
  must remain unchanged.

encoding:
  halmos: halmos.sol.tmpl
  smtchecker: smtchecker.sol.tmpl

fixtures:
  vulnerable: fixtures/vulnerable.sol
  clean: fixtures/clean.sol

provenance:
  tier: original
  source: vergil-original
  license: Apache-2.0
  references:
    - "SWC-105"
    - "OWASP SC01:2026"
  real_world:
    - name: "Hacken HAI bridge-key leak"
      year: 2025
      loss_usd_approx: 170000
      chain: bsc
      url: "https://hacken.io/"

mitigation: |
  Gate `mint`/`burn` with a role check (`onlyRole(MINTER_ROLE)` or
  `onlyOwner`). For cross-chain bridges, additionally require multisig +
  timelock on the minter role — leaked keys then need both signers and
  a delay window.

engineering_notes: |
  Structurally identical to `access-missing-modifier-state-change` —
  the attack is "any function that mutates supply lacks access control."
  Kept as a separate template because the negation property and the
  mitigation are token-specific, and the bench reports group them
  separately. The fixture's `mint` increases totalSupply; the assertion
  checks totalSupply is unchanged when the attacker's call succeeds.
