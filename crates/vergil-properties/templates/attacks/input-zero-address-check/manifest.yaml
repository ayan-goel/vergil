id: input-zero-address-check
name: Missing zero-address check on parameter
category: input-validation
severity: medium

decidability: {smt_status: decidable, expected_solver: z3, expected_theory: lia}

applies_to:
  interfaces: [any]
  primitives: [any]
  patterns: {address_parameter_present: true}

requires: {storage_slots: [], modifiers: {}, external_call_handling: tracked}

negation_property: |
