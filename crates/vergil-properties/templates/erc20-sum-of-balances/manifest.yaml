id: erc20-sum-of-balances
description: sum of all account balances equals totalSupply across all reachable states
cost_class: medium
applies_to:
  interfaces: [ERC20]
requires:
  storage_slots:
    - name: _balances
      type: mapping(address => uint256)
    - name: _totalSupply
      type: uint256
  modifiers: []
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
  smtchecker: smtchecker.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: OpenZeppelin/openzeppelin-contracts certora/specs/ERC20.spec
  license: Apache-2.0
