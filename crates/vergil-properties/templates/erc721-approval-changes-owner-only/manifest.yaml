id: erc721-approval-changes-owner-only
description: approve(spender, tokenId) reverts unless the caller is the owner or an operator approved for all tokens of the owner
cost_class: cheap
applies_to:
  interfaces: [ERC721]
requires:
  storage_slots:
    - name: _owners
      type: mapping(uint256 => address)
    - name: _operatorApprovals
      type: mapping(address => mapping(address => bool))
  modifiers: []
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: ERC-721 EIP, OZ ERC721 _approve auth check
  license: Apache-2.0
