id: erc721-mint-burn-accounting
description: mint(to, tokenId) sets ownerOf(tokenId) == to and increments balanceOf(to); burn(tokenId) clears owner and decrements balance
cost_class: cheap
applies_to:
  interfaces: [ERC721, ERC721Mintable, ERC721Burnable]
requires:
  storage_slots:
    - name: _owners
      type: mapping(uint256 => address)
    - name: _balances
      type: mapping(address => uint256)
  modifiers: []
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: OZ ERC721 _mint / _burn
  license: Apache-2.0
