id: erc721-unauthorized-approve-reverts
description: approve(spender, tokenId) reverts when msg.sender is neither the token owner nor approved-for-all by the owner
cost_class: cheap
applies_to:
  interfaces: [ERC721]
requires:
  storage_slots:
    - name: _owners
      type: mapping(uint256 => address)
    - name: _operatorApprovals
      type: mapping(address => mapping(address => bool))
  modifiers: []
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: ERC-721 EIP / kill criterion
  license: Apache-2.0
