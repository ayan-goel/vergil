id: time-lock-release-idempotent
description: A timelock's release() can only succeed once — once released is true, a second call must revert.
cost_class: cheap
applies_to:
  interfaces: [Timelock]
requires:
  storage_slots:
    - name: released
      type: bool
  modifiers: []
  external_call_handling: havoc
encoding:
  halmos: halmos.sol
provenance:
  tier: original
  source: vergil-original
  inspired_by: OZ TokenTimelock pattern
