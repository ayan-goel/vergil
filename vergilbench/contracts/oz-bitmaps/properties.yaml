version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ BitMaps: setting a bit makes it read true, unsetting makes it read false, and an untouched bit reads false."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_set_then_unset
    params:
      - { name: i, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_untouched_is_false
    params:
      - { name: i, type: uint256 }
    smtchecker_source: src/Contract.sol
