version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ DoubleEndedQueue: a fresh queue is empty, and pushing one element makes length one with that element at the front."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_initially_empty
    params: []
    smtchecker_source: src/Contract.sol
  - name: check_push_front_roundtrip
    params:
      - { name: v, type: bytes32 }
    smtchecker_source: src/Contract.sol
