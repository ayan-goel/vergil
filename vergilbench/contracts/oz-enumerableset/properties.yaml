version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify a registry over OZ EnumerableSet: adding a new address makes it present and grows the set by one, while re-adding an existing address is a no-op."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_add_makes_present
    params:
      - { name: a, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_double_add_is_noop
    params:
      - { name: a, type: address }
    smtchecker_source: src/Contract.sol
