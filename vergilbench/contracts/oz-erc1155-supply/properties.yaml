version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC1155Supply: per-id total supply grows by exactly the minted amount and exists() is false for unminted ids."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_mint_tracks_supply
    params:
      - { name: to, type: address }
      - { name: id, type: uint256 }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_unminted_does_not_exist
    params:
      - { name: id, type: uint256 }
    smtchecker_source: src/Contract.sol
