version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify a compliance blocklist over OZ ERC20: a blocked sender cannot transfer and a transfer to a blocked recipient reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_blocked_sender_cannot_transfer
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_blocked_recipient_cannot_receive
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
