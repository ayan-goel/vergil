version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC20Burnable: burn debits caller balance and total supply by exactly the burned amount, and burning above balance reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_burn_reduces_supply
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_burn_over_balance_reverts
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
