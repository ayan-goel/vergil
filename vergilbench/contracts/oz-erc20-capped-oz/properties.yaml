version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC20Capped: total supply never exceeds the configured cap and any mint that would breach the cap reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_supply_at_most_cap
    params: []
    smtchecker_source: src/Contract.sol
  - name: check_mint_over_cap_reverts
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
