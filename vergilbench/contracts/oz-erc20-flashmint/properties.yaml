version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC20FlashMint (EIP-3156): the default flash fee is zero and maxFlashLoan is zero for any token other than this one."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_default_flash_fee_zero
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_max_flashloan_other_token_zero
    params:
      - { name: other, type: address }
    smtchecker_source: src/Contract.sol
