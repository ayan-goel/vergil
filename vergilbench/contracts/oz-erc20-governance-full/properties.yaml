version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify the full OZ governance token (ERC20Votes + ERC20Permit): the shared nonce base resolves so permit nonces start at zero and votes equal balance after self-delegation."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_initial_nonce_zero
    params:
      - { name: owner, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_self_delegate_matches_balance
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
