version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify a role-gated mintable ERC20 over OZ AccessControl: minting via the MINTER role grows supply exactly and the MINTER role is administered by DEFAULT_ADMIN_ROLE."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_role_mint_increases_supply
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_minter_admin_is_default
    params: []
    smtchecker_source: src/Contract.sol
