version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify the canonical OZ-wizard mintable+burnable+ownable ERC-20: owner mint grows total supply by the minted amount and burn reduces it by the burned amount."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_mint_increases_supply
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_burn_reduces_supply
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
