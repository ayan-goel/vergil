version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify an OZ ERC20 combining Permit + Pausable: permit nonces start at zero and transfers revert while paused."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_initial_nonce_zero
    params:
      - { name: owner, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_paused_blocks_transfer
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
