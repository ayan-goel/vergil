version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC20Permit (EIP-2612): permit nonces start at zero and a permit past its deadline reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_initial_nonce_zero
    params:
      - { name: owner, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_expired_permit_reverts
    params:
      - { name: owner, type: address }
      - { name: spender, type: address }
      - { name: value, type: uint256 }
    smtchecker_source: src/Contract.sol
