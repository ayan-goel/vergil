version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify a realistic OZ stablecoin (ERC20 + Pausable + Permit + AccessControl): the deployer holds the minter role, role-gated mint grows supply exactly, and transfers revert while paused."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_deployer_is_minter
    params: []
    smtchecker_source: src/Contract.sol
  - name: check_paused_blocks_transfer
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_mint_increases_supply
    params:
      - { name: to, type: address }
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
