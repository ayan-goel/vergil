version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC20Votes governance token: voting power is zero before delegation and equals the token balance after self-delegation."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_votes_zero_before_delegation
    params:
      - { name: account, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_self_delegate_matches_balance
    params:
      - { name: amount, type: uint256 }
    smtchecker_source: src/Contract.sol
