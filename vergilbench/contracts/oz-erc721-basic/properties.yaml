version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC721: minting assigns ownership of the tokenId to the recipient, and minting an existing tokenId reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_mint_sets_owner
    params:
      - { name: to, type: address }
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_double_mint_reverts
    params:
      - { name: to, type: address }
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
