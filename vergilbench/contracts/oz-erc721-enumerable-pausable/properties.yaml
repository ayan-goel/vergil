version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify an OZ ERC721 combining Enumerable + Pausable + Ownable: mint increments enumerable supply by one and minting reverts while paused via the merged update chain."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_mint_increments_supply
    params:
      - { name: to, type: address }
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_paused_blocks_mint
    params:
      - { name: to, type: address }
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
