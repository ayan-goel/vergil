version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ ERC721URIStorage: minting with a per-token URI preserves ownership and tokenURI of a nonexistent token reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_mint_with_uri_sets_owner
    params:
      - { name: to, type: address }
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_uri_of_missing_token_reverts
    params:
      - { name: tokenId, type: uint256 }
    smtchecker_source: src/Contract.sol
