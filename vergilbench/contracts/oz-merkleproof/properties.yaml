version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify an OZ MerkleProof allowlist airdrop: a claim with an empty/invalid proof against a nonzero root reverts and no account is pre-marked as claimed."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_empty_proof_reverts
    params:
      - { name: account, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_initially_unclaimed
    params:
      - { name: account, type: address }
    smtchecker_source: src/Contract.sol
