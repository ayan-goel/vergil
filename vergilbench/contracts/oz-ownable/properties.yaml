version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ Ownable: the deployer is the initial owner, transferOwnership reassigns it, and renounceOwnership sets the owner to the zero address."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_deployer_is_owner
    params: []
    smtchecker_source: src/Contract.sol
  - name: check_transfer_sets_owner
    params:
      - { name: n, type: address }
    smtchecker_source: src/Contract.sol
  - name: check_renounce_zeroes_owner
    params: []
    smtchecker_source: src/Contract.sol
