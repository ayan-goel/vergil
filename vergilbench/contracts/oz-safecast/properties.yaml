version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ SafeCast: an in-range downcast round-trips exactly and an out-of-range downcast reverts."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_inrange_roundtrips
    params:
      - { name: x, type: uint256 }
    smtchecker_source: src/Contract.sol
  - name: check_overflow_reverts
    params:
      - { name: x, type: uint256 }
    smtchecker_source: src/Contract.sol
