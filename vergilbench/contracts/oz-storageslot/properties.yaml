version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ StorageSlot: a uint256 written to an explicit storage slot reads back exactly (the primitive proxies use for unstructured storage)."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_slot_write_read
    params:
      - { name: slot, type: bytes32 }
      - { name: v, type: uint256 }
    smtchecker_source: src/Contract.sol
