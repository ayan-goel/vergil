version: 1
property_contract:
  name: Properties
  path: ./Properties.t.sol
  constructor_args: []
intent: "Verify OZ TimelockController: the minimum delay configured at construction is reported and operations that were never scheduled are not pending."
provenance:
  source: openzeppelin-contracts
  version: 5.1.0
  commit: 69c8def5f222ff96f2b5beff05dfba996368aa79
  license: MIT
properties:
  - name: check_min_delay_set
    params: []
    smtchecker_source: src/Contract.sol
  - name: check_unscheduled_not_pending
    params:
      - { name: id, type: bytes32 }
    smtchecker_source: src/Contract.sol
