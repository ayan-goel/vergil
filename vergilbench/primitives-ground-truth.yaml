# V1.5 Phase 3 ground truth — primitive classification labels for the
# 100-contract VergilBench V1.5 corpus.
#
# Format per SPEC §11.3:
#   contracts:
#     - name: <directory under vergilbench/contracts/>
#       primitives: [<kebab-case from SPEC §3.3 taxonomy>, ...]
#
# Taxonomy (SPEC §3.3):
#   token-erc20 / token-erc721 / token-erc1155 / vault / lending-market
#   / amm / vesting / airdrop / governance / staking / bridge / oracle
#   / access-controlled-generic
#
# `[]` = utility library / no primitive signal. The classifier returning
# zero matches on these is the correct call.
#
# Labeled at Phase 3 Slice 5. Multi-primitive labels (e.g. an ERC20 that
# is also Governor-compatible) carry every applicable tag; the classifier
# match is correct if its top-confidence primitive is in the labeled vec.

contracts:
  # ─── Named reference protocols (10) ─────────────────────────────────
  - name: amm-constant-product
    primitives: [amm]
  - name: erc20
    primitives: [token-erc20]
  - name: erc20-capped
    primitives: [token-erc20]
  - name: erc20-pausable
    primitives: [token-erc20]
  - name: erc721
    primitives: [token-erc721]
  - name: lending
    primitives: [lending-market]
  - name: ownable-counter
